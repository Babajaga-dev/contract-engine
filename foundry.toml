[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 10
ffi = false
via_ir = true

# EVM
evm_version = "cancun"

# Remappings
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts/=lib/chainlink/contracts/"
]

# Lint filter — silence style-only noise, keep security-relevant warnings.
# Excluded lints are conventions (Chainlink VRF, OZ v5 immutable, acronyms NFT/VRF)
# that would break ABI compat if changed. Real warnings (unsafe-typecast, unused,
# named-struct-fields) stay visible for the CYBER agent to review pre-mainnet.
[lint]
exclude_lints = [
    "screaming-snake-case-immutable",
    "mixed-case-function",
    "mixed-case-variable",
    "pascal-case-struct",
    "unaliased-plain-import",
]
